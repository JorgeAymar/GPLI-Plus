name: CI

# Runs on every push (any branch) and every pull request (against any base
# branch), so feature branches get feedback before opening a PR too.
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    # Postgres service container: gives lint/typecheck/test/build a real
    # DATABASE_URL to talk to, in case any integration test (or drizzle-kit
    # step) needs a live database. Credentials mirror docker-compose.yml.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: itsm
          POSTGRES_PASSWORD: itsm
          POSTGRES_DB: itsm
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U itsm -d itsm"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      # Dummy/CI-only values - never real secrets. Mirrors .env.example.
      DATABASE_URL: postgres://itsm:itsm@localhost:5432/itsm
      AUTH_SECRET: ci-dummy-auth-secret-not-for-production-use
      AUTH_URL: http://localhost:3000
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: ./.data/documents

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Must run before actions/setup-node so the pnpm binary already
      # exists when setup-node resolves the pnpm store path for caching.
      # No `version` pinned here: it's auto-read from the root
      # package.json "packageManager" field (pnpm@10.13.1).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm-lock.yaml is committed to the repo, so this is a real
      # frozen-lockfile install. If the lockfile is ever removed, swap
      # this for a plain "pnpm install" (and re-commit the generated
      # lockfile) so CI doesn't silently drift from local installs.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
